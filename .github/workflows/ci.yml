name: Continuous Integration

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build: 
    name: Build & Lint (Next.js)
    runs-on: - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
        env: 
    NEXT_TELEMETRY_DISABLED: 1

  security_scan: 
    name: Security Scan (Trivy)
    needs: build
    runs-on: - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'