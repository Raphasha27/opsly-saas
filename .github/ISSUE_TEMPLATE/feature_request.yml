name: Feature Request
description: Suggest an idea for Opsly
labels: ["enhancement"]
body:
  - type: textarea
    id: feature-description
    attributes:
      label: Dynamic Feature Idea
      description: A concise description of what you're proposing.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this needed?
      description: What problem does this solve for startup teams?
    validations:
      required: true
